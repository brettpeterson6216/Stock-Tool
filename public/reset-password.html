<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Implied Lens</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23C89B3C'/><circle cx='16' cy='16' r='8' fill='%23F7F4EE'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#F7F4EE;--cream2:#F0EDE5;--cream3:#E8E4DA;
  --ink:#0E0E0E;--ink2:#2A2A2A;--ink3:#3A3A3A;--ink4:#666;--ink5:#999;
  --gold:#C89B3C;--gold-l:#F0D9A0;--gold-d:#8A6A20;
  --green:#1A7A4A;--red:#B83030;
  --border:rgba(14,14,14,0.08);--border2:rgba(14,14,14,0.14);
  --card:#FFFEFB;--panel:#FDFAF4;
  --shadow-lg:0 8px 40px rgba(0,0,0,0.09);
  --r:4px;--r2:8px;--r3:12px;
  --serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}
nav{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 3.5rem;border-bottom:1px solid var(--border2);background:rgba(247,244,238,0.94);backdrop-filter:blur(16px);}
.nav-logo{font-family:var(--serif);font-size:1.3rem;letter-spacing:-0.01em;color:var(--ink);text-decoration:none;display:flex;align-items:center;gap:10px;}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1.5rem;background:radial-gradient(ellipse 600px 400px at 30% 30%,rgba(200,155,60,0.08),transparent),var(--cream);}
.auth-card{width:100%;max-width:440px;background:var(--card);border:1px solid var(--border2);border-radius:var(--r3);padding:2.5rem 2.25rem;box-shadow:var(--shadow-lg);}
.auth-eyebrow{font-family:var(--mono);font-size:.7rem;color:var(--gold-d);text-transform:uppercase;letter-spacing:0.18em;margin-bottom:.7rem;}
.auth-title{font-family:var(--serif);font-size:2rem;line-height:1.15;letter-spacing:-0.015em;margin-bottom:.4rem;}
.auth-title em{font-style:italic;color:var(--gold-d);}
.auth-sub{font-size:.92rem;color:var(--ink4);margin-bottom:1.75rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:.78rem;font-weight:500;color:var(--ink3);margin-bottom:.4rem;}
.field input{width:100%;padding:.75rem .9rem;font-family:var(--sans);font-size:.95rem;color:var(--ink);background:var(--panel);border:1px solid var(--border2);border-radius:var(--r2);transition:border-color .18s;}
.field input:focus{outline:none;border-color:var(--gold);background:var(--card);box-shadow:0 0 0 3px rgba(200,155,60,0.12);}
.btn-primary{width:100%;padding:.85rem 1rem;background:var(--ink);color:var(--cream);border:none;border-radius:var(--r2);font-family:var(--sans);font-size:.95rem;font-weight:500;cursor:pointer;transition:background .18s;margin-top:.5rem;}
.btn-primary:hover{background:var(--ink2);}
.btn-primary:disabled{background:var(--ink5);cursor:not-allowed;}
.alert{display:none;padding:.7rem .85rem;border-radius:var(--r2);font-size:.85rem;margin-bottom:1rem;line-height:1.4;}
.alert.show{display:block;}
.alert-error{background:rgba(184,48,48,0.08);color:var(--red);border:1px solid rgba(184,48,48,0.2);}
.alert-success{background:rgba(26,122,74,0.08);color:var(--green);border:1px solid rgba(26,122,74,0.2);}
.alt-line{text-align:center;font-size:.88rem;color:var(--ink4);margin-top:1.5rem;}
.alt-line a{color:var(--ink);text-decoration:none;font-weight:500;border-bottom:1px solid var(--gold);}
footer{padding:1.5rem 3.5rem;border-top:1px solid var(--border);font-size:.75rem;color:var(--ink5);display:flex;justify-content:space-between;align-items:center;}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="/"><span class="logo-dot"></span>Implied<em style="font-style:italic;color:var(--gold-d);">Lens</em></a>
</nav>
<main>
  <div class="auth-card" id="card-request">
    <div class="auth-eyebrow">Account recovery</div>
    <h1 class="auth-title">Reset your <em>password</em>.</h1>
    <p class="auth-sub">Enter your email and we'll send you a link to set a new password.</p>
    <div id="alert-req" class="alert"></div>
    <form id="request-form" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input id="email" type="email" autocomplete="email" required placeholder="you@example.com" autofocus>
      </div>
      <button id="req-btn" class="btn-primary" type="submit">Send reset link →</button>
    </form>
    <div class="alt-line"><a href="/login">Back to login</a></div>
  </div>

  <div class="auth-card" id="card-reset" style="display:none;">
    <div class="auth-eyebrow">New password</div>
    <h1 class="auth-title">Choose a new <em>password</em>.</h1>
    <p class="auth-sub">Must be at least 8 characters.</p>
    <div id="alert-reset" class="alert"></div>
    <form id="reset-form" novalidate>
      <div class="field">
        <label for="new-password">New password</label>
        <input id="new-password" type="password" autocomplete="new-password" required minlength="8" placeholder="At least 8 characters" autofocus>
      </div>
      <div class="field">
        <label for="confirm-password">Confirm password</label>
        <input id="confirm-password" type="password" autocomplete="new-password" required placeholder="Repeat password">
      </div>
      <button id="reset-btn" class="btn-primary" type="submit">Set new password →</button>
    </form>
  </div>
</main>
<footer>
  <span>© <span id="year"></span> Implied Lens</span>
  <span style="font-family:var(--mono);letter-spacing:.05em;">IMPLIED LENS · ACCOUNT RECOVERY</span>
</footer>
<script>
document.getElementById('year').textContent = new Date().getFullYear();

const params = new URLSearchParams(window.location.search);
const token  = params.get('token');

if (token) {
  document.getElementById('card-request').style.display = 'none';
  document.getElementById('card-reset').style.display   = 'block';
}

// ---- Request form ----
const reqForm = document.getElementById('request-form');
const reqBtn  = document.getElementById('req-btn');
const alertReq = document.getElementById('alert-req');

function showAlert(el, msg, kind) { el.className = 'alert show alert-' + (kind||'error'); el.textContent = msg; }

reqForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!email) { showAlert(alertReq, 'Please enter your email.'); return; }
  reqBtn.disabled = true; reqBtn.textContent = 'Sending…';
  try {
    await fetch('/api/auth/forgot-password', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email }),
    });
    showAlert(alertReq, 'If an account exists with that email, a reset link has been sent. Check your inbox (and spam folder).', 'success');
    reqBtn.textContent = 'Sent ✓';
  } catch (err) {
    showAlert(alertReq, 'Something went wrong. Please try again.');
    reqBtn.disabled = false; reqBtn.textContent = 'Send reset link →';
  }
});

// ---- Reset form ----
const resetForm = document.getElementById('reset-form');
const resetBtn  = document.getElementById('reset-btn');
const alertReset = document.getElementById('alert-reset');

resetForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('new-password').value;
  const confirm  = document.getElementById('confirm-password').value;
  if (password.length < 8) { showAlert(alertReset, 'Password must be at least 8 characters.'); return; }
  if (password !== confirm) { showAlert(alertReset, 'Passwords do not match.'); return; }
  resetBtn.disabled = true; resetBtn.textContent = 'Saving…';
  try {
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ token, password }),
    });
    const data = await r.json();
    if (!r.ok) { showAlert(alertReset, data.error || 'Could not reset password.'); resetBtn.disabled = false; resetBtn.textContent = 'Set new password →'; return; }
    showAlert(alertReset, 'Password updated! Redirecting to login…', 'success');
    setTimeout(() => { window.location.href = '/login'; }, 1500);
  } catch (err) {
    showAlert(alertReset, 'Something went wrong. Please try again.');
    resetBtn.disabled = false; resetBtn.textContent = 'Set new password →';
  }
});
</script>
</body>
</html>
